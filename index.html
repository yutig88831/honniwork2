<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字易經能量批算系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.6.12/lunar.js"></script>
    <!-- 引入 CryptoJS 用於計算綠界 CheckMacValue -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400&display=swap');
        
        :root {
            --milktea-bg: #F8F5F2;
            --milktea-card: #FFFFFF;
            --milktea-border: #E8E2DB;
            --milktea-text: #5C544E;
            --milktea-accent: #A69080;
            --milktea-highlight: #EAE3DA; 
        }

        body { 
            font-family: 'Noto Serif TC', serif; 
            background-color: var(--milktea-bg); 
            color: var(--milktea-text);
            line-height: 1.6;
        }

        .main-container {
            background-color: var(--milktea-card);
            border-radius: 16px;
            box-shadow: 0 4px 25px rgba(166, 144, 128, 0.08);
            border: 1px solid var(--milktea-border);
        }

        .input-field {
            background-color: #FCFBFA;
            border: 1px solid var(--milktea-border);
            color: var(--milktea-text);
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background-color: var(--milktea-accent);
            color: #FFF;
            letter-spacing: 0.2em;
        }

        .btn-outline {
            border: 1px solid var(--milktea-accent);
            color: var(--milktea-accent);
            transition: all 0.3s ease;
        }
        .btn-outline:hover {
            background-color: var(--milktea-accent);
            color: #FFF;
        }

        .age-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1rem;
            border-bottom: 1px solid #F0EDE9;
        }

        .current-age-highlight {
            background-color: var(--milktea-highlight) !important;
            border-radius: 12px;
            margin: 4px 0;
            border: none;
        }

        .current-status-marker {
            font-size: 0.75rem;
            color: #8C847E;
            font-weight: 400;
            display: block; 
            margin-top: 1px;
        }

        .star-result {
            font-weight: 700;
            font-size: 1.15rem;
        }

        .num-badge {
            font-family: 'Courier New', Courier, monospace;
            color: #B2AAA4;
            font-weight: 700;
            margin-right: 12px;
            font-size: 1.1rem;
        }

        /* 磁場專屬色系 */
        .color-good { color: #8F9E8B; } 
        .color-wealth { color: #C4A46D; } 
        .color-neutral { color: #A69080; } 
        .color-bad { color: #B38B8B; } 
        .color-ghost { color: #8B86A8; } 

        .destiny-banner {
            border-left: 4px solid var(--milktea-accent);
            padding: 0.5rem 1.25rem;
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .star-badge-card {
            background: #FFF;
            border: 1px solid var(--milktea-border);
            padding: 16px 8px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .modal-overlay {
            background-color: rgba(92, 84, 78, 0.6);
            backdrop-filter: blur(4px);
        }

        .analysis-card {
            background: #F9F7F5;
            padding: 1.25rem;
            border-radius: 12px;
            border-left: 3px solid var(--milktea-accent);
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-2xl md:text-3xl font-bold tracking-widest text-stone-700">數字易經能量批算系統</h1>
            <div class="w-10 h-0.5 bg-stone-300 mx-auto mt-4"></div>
        </div>

        <!-- 輸入區 -->
        <div class="main-container p-6 md:p-10 mb-12">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-stone-400 tracking-widest uppercase">身分證字號 / ID CARD</label>
                    <input type="text" id="idCard" placeholder="例：A123456789" class="input-field w-full px-4 py-3 rounded-xl uppercase text-lg">
                </div>
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-stone-400 tracking-widest uppercase">西元出生日期 / BIRTHDATE</label>
                    <div class="flex gap-2">
                        <input type="number" id="sYear" placeholder="年" class="input-field w-1/3 px-1 py-3 rounded-xl">
                        <input type="number" id="sMonth" placeholder="月" class="input-field w-1/4 px-1 py-3 rounded-xl">
                        <input type="number" id="sDay" placeholder="日" class="input-field w-1/4 px-1 py-3 rounded-xl">
                    </div>
                    <div class="text-[11px] text-stone-400 mt-2 font-medium">
                        農曆：<span id="lunarResultText" class="text-stone-500">--</span>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-stone-400 tracking-widest uppercase">手機號碼 / MOBILE</label>
                    <input type="tel" id="phone" placeholder="" class="input-field w-full px-4 py-3 rounded-xl text-lg">
                </div>
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-stone-400 tracking-widest uppercase">車牌號碼 </label>
                    <input type="text" id="carPlate" placeholder="例：ABC-1234" class="input-field w-full px-4 py-3 rounded-xl text-lg uppercase">
                </div>
            </div>
            
            <button onclick="handleCheckout()" id="submitBtn" class="btn-submit w-full mt-12 py-4 rounded-xl font-bold text-base shadow-lg hover:opacity-90 transition-all active:scale-[0.98]">
                生成專屬解析報告
            </button>
            <p class="text-center text-[10px] text-stone-400 mt-4">點擊將跳轉至綠界科技安全支付頁面 (費用 NT$ 299)</p>
        </div>

        <footer class="mt-20 pb-10 text-center text-[11px] text-stone-400 tracking-[0.4em] uppercase opacity-60">
            &copy; Digital Yijing Analysis System
        </footer>
    </div>

    <!-- 綠界金流隱藏表單容器 -->
    <div id="ecpay-form-container" style="display:none;"></div>

    <script>
        // --- 綠界科技配置 (正式環境) ---
        const ECPAY_CONFIG = {
            MerchantID: '3338941',
            HashKey: '6metOtTWlA5Ldhi5',
            HashIV: '16YQ5b8NmORQ4Uqz',
            Action: 'https://payment.ecpay.com.tw/Cashier/AioCheckOut/V5'
        };

        // --- 農曆轉換邏輯 ---
        function updateLunarDisplay() {
            const y = parseInt(document.getElementById('sYear').value);
            const m = parseInt(document.getElementById('sMonth').value);
            const d = parseInt(document.getElementById('sDay').value);
            const label = document.getElementById('lunarResultText');
            if (y > 1900 && m > 0 && m <= 12 && d > 0 && d <= 31) {
                try {
                    const solar = Solar.fromYmd(y, m, d);
                    const lunar = solar.getLunar();
                    label.innerText = `${lunar.getYear() - 1911}.${lunar.getMonth()}.${lunar.getDay()}`;
                } catch(e) { label.innerText = "--"; }
            } else { label.innerText = "--"; }
        }

        document.getElementById('sYear').addEventListener('input', updateLunarDisplay);
        document.getElementById('sMonth').addEventListener('input', updateLunarDisplay);
        document.getElementById('sDay').addEventListener('input', updateLunarDisplay);

        // --- 金流跳轉處理 ---
        function handleCheckout() {
            const idVal = document.getElementById('idCard').value.trim();
            const y = document.getElementById('sYear').value;
            const phone = document.getElementById('phone').value.trim();

            if (!idVal || !y || !phone) {
                alert("請填寫完整資訊以生成報告。");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "跳轉中...";
            btn.disabled = true;

            // 1. 準備交易資料
            const now = new Date();
            const tradeDate = now.getFullYear() + '/' + 
                             String(now.getMonth() + 1).padStart(2, '0') + '/' + 
                             String(now.getDate()).padStart(2, '0') + ' ' + 
                             String(now.getHours()).padStart(2, '0') + ':' + 
                             String(now.getMinutes()).padStart(2, '0') + ':' + 
                             String(now.getSeconds()).padStart(2, '0');
            
            const tradeNo = 'YJ' + Date.now(); // 產生唯一交易編號

            const params = {
                MerchantID: ECPAY_CONFIG.MerchantID,
                MerchantTradeNo: tradeNo,
                MerchantTradeDate: tradeDate,
                PaymentType: 'aio',
                TotalAmount: '299', // 設定金額
                TradeDesc: '數字易經專屬解析報告',
                ItemName: '數字易經深度解析報告',
                ReturnURL: 'https://www.example.com/api/payment/callback', // 綠界回傳結果網址
                OrderResultURL: window.location.href, // 支付完成後跳回目前頁面
                ChoosePayment: 'ALL',
                EncryptType: '1'
            };

            // 2. 計算 CheckMacValue
            const checkMacValue = generateCheckMacValue(params, ECPAY_CONFIG.HashKey, ECPAY_CONFIG.HashIV);

            // 3. 建立 POST 表單並送出
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = ECPAY_CONFIG.Action;

            for (const key in params) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = params[key];
                form.appendChild(input);
            }

            const macInput = document.createElement('input');
            macInput.type = 'hidden';
            macInput.name = 'CheckMacValue';
            macInput.value = checkMacValue;
            form.appendChild(macInput);

            document.body.appendChild(form);
            form.submit();
        }

        // 綠界檢查碼算法
        function generateCheckMacValue(params, key, iv) {
            let raw = `HashKey=${key}&`;
            const sortedKeys = Object.keys(params).sort();
            raw += sortedKeys.map(k => `${k}=${params[k]}`).join('&');
            raw += `&HashIV=${iv}`;

            let encoded = encodeURIComponent(raw).toLowerCase()
                .replace(/%20/g, '+')
                .replace(/%2d/g, '-')
                .replace(/%5f/g, '_')
                .replace(/%2e/g, '.')
                .replace(/%21/g, '!')
                .replace(/%2a/g, '*')
                .replace(/%28/g, '(')
                .replace(/%29/g, ')');

            return CryptoJS.SHA256(encoded).toString(CryptoJS.enc.Hex).toUpperCase();
        }
    </script>
</body>
</html>
